<div class="card-grid">
  {% assign services_data = site.data.services %}
  {% if site.active_lang == 'pl' and site.data.services_pl %}
    {% assign services_data = site.data.services_pl %}
  {% endif %}
  {% for service in services_data.services limit: 6 %}
    <div class="card">
      <h3 class="card__title">{{ service.title }}</h3>
      <p class="card__text">{{ service.short }}</p>
    </div>
  {% endfor %}
</div>
