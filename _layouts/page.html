---
layout: default
---

<article>
  <div class="page-header">
    <div class="container">
      <h1>{{ page.title }}</h1>
      {% if page.subtitle %}
        <p>{{ page.subtitle }}</p>
      {% endif %}
    </div>
  </div>

  <div class="container container--article section content">
    {{ content }}
  </div>
</article>
